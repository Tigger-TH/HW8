<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | HW8</title>
<meta name="description" content="ส่งข้อความติดต่อผ่านฟอร์ม หรือดูช่องทางติดต่ออื่น ๆ">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container nav-wrap">
    <a class="brand" href="index.html"><em>Tigger</em></a>
    <nav class="nav" aria-label="เมนูหลัก">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="cv.html">CV</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="contact.html" aria-current="page">Contact</a>
    </nav>
  </div>
</header>
<div class="course-bar"><div class="container">310-2203 Back-End Software Development</div></div>

<main>
  <section class="hero" style="padding-bottom:40px;">
    <div class="container">
      <span class="eyebrow">contact</span>
      <h1>ติดต่อผม</h1>
      <p class="lead">มีคำถามเกี่ยวกับผลงาน อยากพูดคุยเรื่องโปรเจกต์ หรือแค่อยากทักทาย ส่งข้อความมาได้ที่ฟอร์มด้านล่าง</p>
    </div>
  </section>

  <section class="section">
    <div class="container grid-2">

      <form class="form-grid" action="#" method="post" onsubmit="return handleSubmit(event)">
        <div class="field">
          <label for="name">ชื่อ-นามสกุล</label>
          <input type="text" id="name" name="name" placeholder="กรอกชื่อของคุณ" required>
        </div>
        <div class="field">
          <label for="email">อีเมล</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
          <p class="hint">ผมจะใช้อีเมลนี้ในการตอบกลับเท่านั้น</p>
        </div>
        <div class="field">
          <label for="message">ข้อความ</label>
          <textarea id="message" name="message" placeholder="พิมพ์ข้อความของคุณที่นี่..." required></textarea>
        </div>
        <div>
          <button type="submit" class="btn btn-primary">ส่งข้อความ</button>
        </div>
      </div>


      <script>
        function handleSubmit(e){
          e.preventDefault();
          alert('ขอบคุณสำหรับข้อความครับ! (นี่คือระบบตัวอย่าง ยังไม่ได้เชื่อมต่อกับ Server ส่งจริง)');
          e.target.reset();
          return false;
        }
      </script>

    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    6810301012 &middot; Deployed on GitHub Pages
  </div>
</footer>

</body>
</html>
